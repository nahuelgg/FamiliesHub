# ============================================
# Docker Compose - Families Hub
# ============================================
# Uso:
#   docker compose up -d          # Iniciar servicios
#   docker compose down           # Detener servicios
#   docker compose logs -f        # Ver logs
# ============================================

services:
  # ============================================
  # App (Frontend + Backend)
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: families-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    networks:
      - families-network

  # ============================================
  # Nginx (Proxy reverso global)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: families-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - families-network

networks:
  families-network:
    driver: bridge
